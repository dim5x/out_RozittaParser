# Rozitta Parser — сборка Nuitka (Windows, Linux, macOS Intel/ARM) и публикация в GitHub Releases.
#
# Триггеры:
#   • workflow_dispatch — сборка; в Release только если «Также загрузить в GitHub Release» и указан тег
#   • push тегов v* — всегда публикация в Release по имени тега
#
# Требуется: в репозитории есть assets/rozitta_idle.ico (и остальные файлы в assets/).
#
# В корне репозитория не должно быть пакета/папки с именем «resource» — это имя модуля stdlib;
# иначе Nuitka на Linux/macOS ломается. Перед сборкой workflow переименовывает такую папку.

name: Nuitka Release

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Также загрузить в GitHub Release"
        type: boolean
        required: false
        default: false
      release_tag:
        description: "Тег релиза (например v1.2.3) для ручного запуска"
        type: string
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: nuitka-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            slug: windows-x64
            mode: onefile
            extra: >-
              --windows-console-mode=disable
              --windows-icon-from-ico=assets/rozitta_idle.ico
            package_cmd: |
              set -euo pipefail
              mkdir -p upload
              test -f "dist/RozittaParser.exe"
              cp "dist/RozittaParser.exe" "upload/RozittaParser-Windows-x64.exe"
          - label: Linux x64
            runner: ubuntu-22.04
            slug: linux-x64
            mode: onefile
            extra: "--linux-icon=assets/rozitta_idle.png"
            package_cmd: |
              set -euo pipefail
              mkdir -p upload
              if [ ! -f dist/RozittaParser ]; then
                echo "Expected dist/RozittaParser"
                ls -la dist/
                exit 1
              fi
              chmod +x dist/RozittaParser
              tar -I 'xz -9e' -cf upload/RozittaParser-Linux-x64.tar.xz -C dist RozittaParser
          - label: macOS Intel x64
            runner: macos-15-intel
            slug: macos-intel-x64
            mode: app
            extra: >-
              --macos-app-icon=assets/rozitta_idle.ico
              --macos-app-name=RozittaParser
              --output-basename=RozittaParser
            package_cmd: |
              set -euo pipefail
              APP=$(find dist -maxdepth 3 -name "*.app" -print -quit)
              if [ -z "$APP" ]; then
                echo "Could not find .app in dist/"
                ls -laR dist/
                exit 1
              fi
              mkdir -p upload
              (cd "$(dirname "$APP")" && zip -r9 "${GITHUB_WORKSPACE}/upload/RozittaParser-macOS-Intel-x64.zip" "$(basename "$APP")")
          - label: macOS Apple Silicon arm64
            runner: macos-15
            slug: macos-arm64
            mode: app
            extra: >-
              --macos-app-icon=assets/rozitta_idle.ico
              --macos-app-name=RozittaParser
            package_cmd: |
              set -euo pipefail
              APP=$(find dist -maxdepth 3 -name "*.app" -print -quit)
              if [ -z "$APP" ]; then
                echo "Could not find .app in dist/"
                ls -laR dist/
                exit 1
              fi
              mkdir -p upload
              (cd "$(dirname "$APP")" && zip -r9 "${GITHUB_WORKSPACE}/upload/RozittaParser-macOS-arm64.zip" "$(basename "$APP")")

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build cache (Nuitka, ccache)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/Nuitka
            ~/.cache/ccache
            .nuitka
          key: build-cache-${{ runner.os }}-${{ matrix.slug }}-${{ hashFiles('.github/workflows/requirements-build.txt') }}
          restore-keys: |
            build-cache-${{ runner.os }}-${{ matrix.slug }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/requirements-build.txt

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache patchelf \
            libgl1-mesa-dev libdbus-1-3 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-cursor0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements-build.txt
          pip install -r requirements.txt

      - name: Build (Nuitka)
        shell: bash
        env:
          # Максимальное сжатие onefile-payload (Nuitka использует zstandard при наличии пакета)
          PYTHONHASHSEED: "0"
        run: |
          set -euo pipefail
          MODE="${{ matrix.mode }}"
          EXTRA="${{ matrix.extra }}"
          # Убираем переводы строк из многострочного YAML для macOS
          EXTRA=$(echo "$EXTRA" | tr '\n' ' ' | xargs)
          python -m nuitka \
            --mode="$MODE" \
            --assume-yes-for-downloads \
            --enable-plugin=pyside6 \
            --include-data-dir=assets=assets \
            --lto=yes \
            --output-dir=dist \
            --output-filename=RozittaParser \
            --remove-output \
            $EXTRA \
            main.py
          echo "---- dist ----"
          ls -laR dist/ || true

      - name: Package
        shell: bash
        run: |
          ${{ matrix.package_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.slug }}
          path: upload/*
          if-no-files-found: error

  release:
    name: Publish to GitHub Releases
    needs: build
    if: >
      success() && (
        github.ref_type == 'tag' ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.publish_to_release == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Проверка release_tag при ручном запуске
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          TAG="$(echo -n "$TAG" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$TAG" ]; then
            echo "::error::Укажите тег в поле release_tag (например v1.2.3), если включена загрузка в Release."
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      - name: List release files
        run: ls -la release-assets/

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            TAG="$(echo -n "$TAG" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Rozitta Parser ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
